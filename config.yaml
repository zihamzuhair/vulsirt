paths:
  raw_data: data/raw/dataset.jsonl
  processed_data: data/processed/dataset.jsonl
  checkpoints: checkpoints
  results: results
  logs: logs

model:
  name: microsoft/codebert-base
  source_max_length: 512
  ir_max_length: 512
  latent_dimension: 256
  dropout: 0.1

training:
  batch_size: 8
  epochs: 5
  learning_rate: 0.00002
  seed: 42
  baseline: b4
  threshold: 0.5
  resume: true
  gradient_clip: 1.0
