paths:
  raw_primevul: data/raw/primevul
  raw_rust: data/raw/rust/rustsec_osv_dataset.jsonl
  processed_primevul: data/processed/primevul_dataset.jsonl
  processed_rust: data/processed/rust_dataset.jsonl
  llvm_errors: logs/llvm_generation_errors.jsonl
  checkpoints: checkpoints
  results: results
  logs: logs

model:
  name: microsoft/codebert-base
  source_max_length: 512
  ir_max_length: 512
  latent_dimension: 256
  projection:
    latent_dimension: 256
  gating:
    mode: learned
    bias_init: 0.0
    temperature: 1.0
    fixed_alpha:
  dropout: 0.1

training:
  batch_size: 8
  epochs: 5
  learning_rate: 0.00002
  seed: 42
  baseline: b4
  threshold: 0.5
  resume: true
  gradient_clip: 1.0
  class_weights:
    non_vulnerable: 1.0
    vulnerable: 1.0

preprocessing:
  generate_missing_ir: false
  ir_failure: empty
  rust_ir_failure: empty

data:
  seed: 42
  max_records:
  balance:
    enabled: false
    non_vulnerable:
    vulnerable:
    strategy: undersample
  split:
    mode: record
    ratios:
      train: 0.8
      validation: 0.1
      test: 0.1
    stratify_by_label: true
