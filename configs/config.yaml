paths:
  raw_primevul: data/raw/primevul
  raw_rust: data/raw/rust/rustsec_osv_dataset.jsonl
  processed_primevul: data/processed/primevul_dataset_with_llvm.jsonl
  processed_rust: data/processed/rustsec_osv_dataset_with_llvm.jsonl
  checkpoints: E:/Checkpoints/full
  results: results/full
  logs: logs/full

model:
  source_name: microsoft/codebert-base
  ir_name: microsoft/codebert-base
  source_max_length: 512
  ir_max_length: 512
  dropout: 0.1
  projection:
    latent_dimension: 256
  gating:
    mode: learned
    bias_init: 0.0
    temperature: 1.0
  encoder_initialization:
    enabled: false
    source_checkpoint: E:/Checkpoints/full/b1_best.pt
    ir_checkpoint: E:/Checkpoints/full/b2_best.pt

training:
  baseline: b4
  batch_size: 8
  epochs: 5
  learning_rate: 0.00002
  seed: 42
  threshold: 0.5
  resume: true
  gradient_clip: 1.0
  class_weights:
    non_vulnerable: 1.0
    vulnerable: 1.0

data:
  seed: 42
  split:
    mode: record
    ratios:
      train: 0.8
      validation: 0.1
      test: 0.1
    stratify_by_label: true
