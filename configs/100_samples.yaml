paths:
  processed_primevul: data/processed/100_samples/primevul_dataset_with_llvm.jsonl
  processed_rust: data/processed/rustsec_osv_dataset_with_llvm.jsonl
  checkpoints: E:/Checkpoints/100_samples
  results: results/100_samples
  logs: logs/100_samples

model:
  source_name: microsoft/codebert-base
  ir_name: microsoft/codebert-base
  source_max_length: 512
  ir_max_length: 512
  dropout: 0.1
  projection:
    latent_dimension: 256
  gating:
    mode: learned
    bias_init: 0.0
    temperature: 1.0
  encoder_initialization:
    enabled: false
    source_checkpoint: E:/Checkpoints/100_samples/b1_best.pt
    ir_checkpoint: E:/Checkpoints/100_samples/b2_best.pt

training:
  baseline: b4
  batch_size: 4
  epochs: 2
  learning_rate: 0.00002
  seed: 42
  threshold: 0.5
  resume: false
  gradient_clip: 1.0
  class_weights:
    non_vulnerable: 1.0
    vulnerable: 1.0

data:
  datasets:
    primevul:
      max_records: 100
      balance:
        enabled: true
        vulnerable: 50
        non_vulnerable: 50
  split:
    ratios:
      train: 0.8
      validation: 0.1
      test: 0.1
