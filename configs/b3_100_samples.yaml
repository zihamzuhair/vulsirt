inherits: ../configs/config.yaml

paths:
  raw_primevul: data/raw/primevul
  raw_rust: data/raw/rust/rustsec_osv_dataset.jsonl
  processed_primevul: data/processed/100_samples/primevul_dataset.jsonl
  processed_rust: data/processed/100_samples/rust_dataset.jsonl
  llvm_errors: logs/100_samples/b3_100_samples_failures.jsonl
  checkpoints: E:/Checkpoints/b3_100_samples
  results: results/b3_100_samples
  logs: logs/b3_100_samples

model:
  source_name: microsoft/codebert-base
  ir_name: microsoft/codebert-base
  source_max_length: 512
  ir_max_length: 512
  latent_dimension: 256
  dropout: 0.1
  projection:
    latent_dimension: 256
  gating:
    mode: learned
    bias_init: 0.0
    temperature: 1.0
    fixed_alpha:

training:
  batch_size: 4
  epochs: 2
  learning_rate: 0.00002
  seed: 42
  baseline: b3
  threshold: 0.5
  resume: false
  gradient_clip: 1.0
  class_weights:
    non_vulnerable: 1.0
    vulnerable: 1.0

preprocessing:
  generate_missing_ir: true
  advanced_ir_generation: true
  compiler_timeout_seconds: 45
  ir_failure: empty
  rust_ir_failure: empty

data:
  seed: 42
  max_records:
  balance:
    enabled: false
    non_vulnerable:
    vulnerable:
    strategy: undersample
  datasets:
    primevul:
      max_records: 100
      balance:
        enabled: true
        non_vulnerable: 50
        vulnerable: 50
    rust:
      max_records: 100
      balance:
        enabled: true
        non_vulnerable: 50
        vulnerable: 50
  split:
    mode: config
    ratios:
      train: 0.8
      validation: 0.1
      test: 0.1
    stratify_by_label: true
